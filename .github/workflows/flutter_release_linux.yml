name: Flutter Release Linux
on:
  # 手动触发
  workflow_dispatch:
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      # 使用本项目
      - uses: actions/checkout@v5.0.0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install clang cmake ninja-build pkg-config mesa-utils libgtk-3-dev -y
        shell: bash

      #设置flutter
      - uses: subosito/flutter-action@v2.14.0
        with:
          # The Flutter version to make available on the path
          flutter-version: 3.35.7
          # The Flutter build release channel
          channel: # optional, default is stable

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: '3.0.8'

      # Get flutter dependencies and build
      - name: Build Linux
        working-directory: gui/danmakufactory_flutter
        run: |
          flutter pub get
          flutter build linux --release

      - name: Upload Linux
        uses: actions/upload-artifact@v4.6.2
        with:
          name: danmakufactory_linux_amd64
          path: gui/danmakufactory_flutter/build/linux/x64/release/bundle/